build:
  gpu: true
  cuda: "11.8"
  python_version: "3.11"

  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"

  python_packages:
    - "numpy>=1.24,<2"
    - "Pillow>=9.5"
    - "scikit-learn>=1.3"
    - "scikit-image>=0.21"
    - "pydicom>=2.4"
    - "torch==2.0.1"
    - "torchvision>=0.15"
    - "diffusers==0.37.1"
    - "transformers>=4.41,<5"
    - "peft>=0.5"
    - "accelerate>=0.21"

  # Download SD v1.5 weights at build time so cold starts are fast
  run:
    - "python -c \"
import torch;
from diffusers import StableDiffusionImg2ImgPipeline;
StableDiffusionImg2ImgPipeline.from_pretrained(
    'runwayml/stable-diffusion-v1-5',
    torch_dtype=torch.float16,
    safety_checker=None,
    requires_safety_checker=False,
);
print('SD v1.5 cached.')
\""

predict: "predict.py:Predictor"
